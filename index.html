<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kuis Jaringan Komputer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* Reset */
body, html{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family: Arial, Helvetica, sans-serif;
}

/* Tombol keluar */
.btn-exit-custom{
position:fixed;
top:15px;
right:15px;
background:#ff4d4d;
color:white;
border:none;
border-radius:50px;
padding:10px 22px;
font-weight:bold;
cursor:pointer;
box-shadow:0px 4px 10px rgba(0,0,0,0.3);
z-index:9999;
transition:0.2s;
}

.btn-exit-custom:hover{
background:#cc0000;
transform:scale(1.05);
}

/* iframe fullscreen */
.quiz-frame{
width:100vw;
height:100vh;
border:none;
}
</style>
</head>

<body>

<button onclick="exitQuiz()" class="btn-exit-custom">
✕ Keluar Kuis
</button>

<!-- iframe memanggil file kuis -->
<iframe 
class="quiz-frame"
title="Kuis Jaringan Komputer"
src="ganti2.html"
sandbox="allow-same-origin allow-scripts allow-forms allow-popups">
</iframe>

<script>
function exitQuiz(){

// coba tutup tab
window.close();

// fallback jika browser blokir
setTimeout(function(){

if(!window.closed){

let keluar = confirm(
"Kuis akan ditutup.\nKlik OK untuk keluar dari halaman."
);

if(keluar){
window.location.href = "about:blank";
}

}

},300);

}
</script>

</body>
</html>
