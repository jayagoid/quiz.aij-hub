<!DOCTYPE html>
<html dir="ltr" lang="id-ID" class="theme light EHoceA">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Kuis Jaringan Komputer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="./ganti_files/a402f2dd19419843.ltr.css">
    
    <style>
        /* CSS Tombol Keluar Pojok Kanan Atas */
        .btn-exit-custom {
            position: fixed; /* Membuat posisi tetap saat di-scroll */
            top: 15px;       /* Jarak dari atas */
            right: 15px;     /* Jarak dari kanan */
            background-color: #ff4d4d !important; 
            color: white !important;
            border: 2px solid white; /* Tambahan border agar lebih terlihat */
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            z-index: 9999;    /* Memastikan tombol di atas Iframe */
            font-family: sans-serif;
            font-size: 14px;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-exit-custom:hover {
            background-color: #cc0000 !important;
            transform: scale(1.05); /* Efek membesar sedikit saat disentuh */
        }

        /* Menghilangkan margin default agar Iframe penuh */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    </style>
</head>

<body>
    <button onclick="closeWindow()" class="btn-exit-custom">
        ✕ Keluar Kuis
    </button>

    <div id="root">
        <main class="_8OlyIw">
            <div class="_4KoDHA">
                <div style="height: 100vh; width: 100vw;">
                    <iframe title="Kuis Jaringan" src="./ganti_files/index.html" style="width:100%; height:100%; border:0;" sandbox="allow-same-origin allow-scripts allow-popups allow-forms" allow=""></iframe>
                </div>
            </div>
        </main>
    </div>

    <script>
        function closeWindow() {
            // Mencoba menutup tab
            window.close();

            // Jika gagal (karena proteksi browser), munculkan konfirmasi
            setTimeout(function() {
                if (!window.closed) {
                    if (confirm("Gagal menutup otomatis. Ingin kembali ke halaman sebelumnya atau menutup tab ini secara manual?")) {
                        // Jika dalam aplikasi, arahkan ke blank atau link spesifik
                        window.location.href = "about:blank"; 
                    }
                }
            }, 300);
        }
    </script>
</body>
</html>
